services:
  pentaract:
    image: norbega/pentaract:latest
    pull_policy: always
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    restart: unless-stopped
    # To enable local filesystem uploads, set LOCAL_UPLOAD_BASE_PATH in .env
    # to the host directory you want to expose, then uncomment the volume below.
    # volumes:
    #   - "${LOCAL_UPLOAD_BASE_PATH}:/mnt/data:ro"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: public.ecr.aws/docker/library/postgres:latest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pentaract}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pentaract}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pentaract}
      POSTGRES_DB: ${DATABASE_NAME:-pentaract}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - type: bind
        source: ./persistent_data/db
        target: /var/lib/postgresql/data

  db-backup:
    image: public.ecr.aws/docker/library/postgres:latest
    entrypoint: ["/usr/local/bin/db-backup-cron.sh"]
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-pentaract}
      DATABASE_NAME: ${DATABASE_NAME:-pentaract}
      PGPASSWORD: ${DATABASE_PASSWORD:-pentaract}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - type: bind
        source: ./scripts/db-backup.sh
        target: /usr/local/bin/db-backup.sh
        read_only: true
      - type: bind
        source: ./scripts/db-backup-cron.sh
        target: /usr/local/bin/db-backup-cron.sh
        read_only: true
      - type: bind
        source: ./scripts/db-restore.sh
        target: /usr/local/bin/db-restore.sh
        read_only: true
      - type: bind
        source: ./persistent_data/backups
        target: /backups
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # Development service: compile and test inside containers
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: bind
        source: ./persistent_data/go-mod-cache
        target: /go/pkg/mod
      - type: bind
        source: ./persistent_data/go-build-cache
        target: /tmp/go-build-cache
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      GOCACHE: /tmp/go-build-cache
      GOMODCACHE: /go/pkg/mod
    profiles:
      - dev
