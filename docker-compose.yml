services:
  pentaract:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pentaract}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pentaract}
      POSTGRES_DB: ${DATABASE_NAME:-pentaract}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pentaract}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./persistent_data/db:/var/lib/postgresql/data

  # Development service: compile and test inside containers
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - ./persistent_data/go-mod-cache:/go/pkg/mod
      - ./persistent_data/go-build-cache:/root/.cache/go-build
    working_dir: /app
    profiles:
      - dev
