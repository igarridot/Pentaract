services:
  init-perms:
    image: public.ecr.aws/docker/library/alpine:3.20
    command: >
      sh -c "
      mkdir -p /data/db /data/go-mod-cache /data/go-build-cache &&
      chmod -R 0777 /data
      "
    volumes:
      - ./persistent_data:/data

  pentaract:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pentaract}"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      init-perms:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pentaract}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pentaract}
      POSTGRES_DB: ${DATABASE_NAME:-pentaract}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./persistent_data/db:/var/lib/postgresql/data

  # Development service: compile and test inside containers
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - ./persistent_data/go-mod-cache:/go/pkg/mod
      - ./persistent_data/go-build-cache:/tmp/go-build-cache
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      GOCACHE: /tmp/go-build-cache
      GOMODCACHE: /go/pkg/mod
    profiles:
      - dev
