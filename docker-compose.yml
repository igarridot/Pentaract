services:
  pentaract:
    image: norbega/pentaract:latest
    pull_policy: always
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./local_uploads
        target: /data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: public.ecr.aws/docker/library/postgres:latest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pentaract}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pentaract}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pentaract}
      POSTGRES_DB: ${DATABASE_NAME:-pentaract}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - type: bind
        source: ./persistent_data/db
        target: /var/lib/postgresql/data

  # Development service: compile and test inside containers
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: bind
        source: ./persistent_data/go-mod-cache
        target: /go/pkg/mod
      - type: bind
        source: ./persistent_data/go-build-cache
        target: /tmp/go-build-cache
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      GOCACHE: /tmp/go-build-cache
      GOMODCACHE: /go/pkg/mod
    profiles:
      - dev
