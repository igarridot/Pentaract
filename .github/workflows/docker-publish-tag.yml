name: Publish Docker Image Manually

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semantic version tag to publish to Docker Hub
        required: true
        type: string

jobs:
  docker-publish:
    name: Build And Push To Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Resolve release tag
        id: version
        run: |
          set -euo pipefail

          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+$'
          release_tag="${{ inputs.tag }}"

          if ! printf '%s\n' "${release_tag}" | grep -Eq "${semver_regex}"; then
            echo "Ref ${release_tag} is not a semantic version tag"
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Release tag: ${release_tag}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            norbega/pentaract:${{ steps.version.outputs.tag }}
            norbega/pentaract:latest
